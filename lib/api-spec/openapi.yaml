openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BD Digital Services API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Product categories
  - name: products
    description: Digital products
  - name: orders
    description: Customer orders
  - name: settings
    description: Site settings
  - name: notices
    description: Announcement notices
  - name: admin
    description: Admin operations
  - name: stats
    description: Statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: activeOnly
          in: query
          required: false
          schema:
            type: ["boolean", "null"]
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/featured:
    get:
      operationId: listFeaturedProducts
      tags: [products]
      summary: List featured/popular products
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (admin)
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Submit an order (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/bulk-status:
    patch:
      operationId: bulkUpdateOrderStatus
      tags: [orders]
      summary: Bulk update order statuses (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpdateOrderStatusBody"
      responses:
        "200":
          description: Updated orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get site settings
      responses:
        "200":
          description: Site settings as key-value map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update site settings (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  /notice:
    get:
      operationId: getActiveNotice
      tags: [notices]
      summary: Get active announcement notice
      responses:
        "200":
          description: Active notice or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notice"
    post:
      operationId: createNotice
      tags: [notices]
      summary: Create/update notice (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoticeBody"
      responses:
        "200":
          description: Created/updated notice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notice"
    put:
      operationId: updateNotice
      tags: [notices]
      summary: Update active notice (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoticeBody"
      responses:
        "200":
          description: Updated notice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notice"

  /admin/credentials:
    put:
      operationId: changeAdminCredentials
      tags: [admin]
      summary: Change admin credentials (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeAdminCredentialsBody"
      responses:
        "200":
          description: Credentials updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeAdminCredentialsResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Wrong current password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard stats
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Category:
      type: object
      properties:
        id:
          type: integer
        nameBn:
          type: string
        nameEn:
          type: string
        slug:
          type: string
        icon:
          type: string
        sortOrder:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - nameBn
        - nameEn
        - slug
        - icon
        - sortOrder
        - isActive
        - createdAt

    CreateCategoryBody:
      type: object
      properties:
        nameBn:
          type: string
        nameEn:
          type: string
        slug:
          type: string
        icon:
          type: string
        sortOrder:
          type: integer
        isActive:
          type: boolean
      required:
        - nameBn
        - nameEn
        - slug
        - icon

    Product:
      type: object
      properties:
        id:
          type: integer
        nameBn:
          type: string
        nameEn:
          type: string
        descriptionBn:
          type: ["string", "null"]
        descriptionEn:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        categoryNameEn:
          type: ["string", "null"]
        categoryNameBn:
          type: ["string", "null"]
        priceBdt:
          type: string
        priceUsd:
          type: string
        badge:
          type: ["string", "null"]
        isActive:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - nameBn
        - nameEn
        - priceBdt
        - priceUsd
        - isActive
        - sortOrder
        - createdAt

    CreateProductBody:
      type: object
      properties:
        nameBn:
          type: string
        nameEn:
          type: string
        descriptionBn:
          type: ["string", "null"]
        descriptionEn:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        priceBdt:
          type: string
        priceUsd:
          type: string
        badge:
          type: ["string", "null"]
        isActive:
          type: boolean
        sortOrder:
          type: integer
      required:
        - nameBn
        - nameEn
        - priceBdt
        - priceUsd

    Order:
      type: object
      properties:
        id:
          type: integer
        customerName:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        productId:
          type: ["integer", "null"]
        productName:
          type: ["string", "null"]
        paymentMethod:
          type: string
        message:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, processing, completed, cancelled]
        createdAt:
          type: string
      required:
        - id
        - customerName
        - phone
        - paymentMethod
        - status
        - createdAt

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, processing, completed, cancelled]
      required:
        - status

    BulkUpdateOrderStatusBody:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
        status:
          type: string
          enum: [pending, processing, completed, cancelled]
      required:
        - ids
        - status

    UpdateOrderStatusParams:
      type: object
      properties:
        id:
          type: integer
      required:
        - id

    CreateOrderBody:
      type: object
      properties:
        customerName:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        productId:
          type: ["integer", "null"]
        paymentMethod:
          type: string
        message:
          type: ["string", "null"]
      required:
        - customerName
        - phone
        - paymentMethod

    SiteSettings:
      type: object
      properties:
        siteName:
          type: string
        whatsapp:
          type: string
        telegram:
          type: string
        facebook:
          type: string
        bkashNumber:
          type: string
        nagadNumber:
          type: string
        rocketNumber:
          type: string
        footerText:
          type: string
        primaryColor:
          type: string
        secondaryColor:
          type: string
        accentColor:
          type: string
        heroBadge:
          type: string
        heroTitle:
          type: string
        heroTitleHighlight:
          type: string
        heroSubtitle:
          type: string
        heroPrimaryBtn:
          type: string
        heroWhatsappBtn:
          type: string
        heroStat1Value:
          type: string
        heroStat1Label:
          type: string
        heroStat2Value:
          type: string
        heroStat2Label:
          type: string
        heroStat3Value:
          type: string
        heroStat3Label:
          type: string
        heroStat4Value:
          type: string
        heroStat4Label:
          type: string
      required:
        - siteName
        - whatsapp
        - telegram
        - facebook
        - bkashNumber
        - nagadNumber
        - rocketNumber
        - footerText
        - primaryColor
        - secondaryColor
        - accentColor
        - heroBadge
        - heroTitle
        - heroTitleHighlight
        - heroSubtitle
        - heroPrimaryBtn
        - heroWhatsappBtn
        - heroStat1Value
        - heroStat1Label
        - heroStat2Value
        - heroStat2Label
        - heroStat3Value
        - heroStat3Label
        - heroStat4Value
        - heroStat4Label

    Notice:
      type: object
      properties:
        id:
          type: integer
        messageBn:
          type: string
        messageEn:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - messageBn
        - messageEn
        - isActive
        - createdAt

    CreateNoticeBody:
      type: object
      properties:
        messageBn:
          type: string
        messageEn:
          type: string
        isActive:
          type: boolean
      required:
        - messageBn
        - messageEn

    ChangeAdminCredentialsBody:
      type: object
      properties:
        currentPassword:
          type: string
        newUsername:
          type: string
        newPassword:
          type: string
        confirmPassword:
          type: string
      required:
        - currentPassword

    ChangeAdminCredentialsResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    AdminLoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AdminLoginResponse:
      type: object
      properties:
        token:
          type: string
        message:
          type: string
      required:
        - token
        - message

    OrdersByDayItem:
      type: object
      properties:
        date:
          type: string
        count:
          type: integer
      required:
        - date
        - count

    DashboardStats:
      type: object
      properties:
        totalProducts:
          type: integer
        totalCategories:
          type: integer
        totalOrders:
          type: integer
        activeProducts:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        ordersByStatus:
          type: object
          additionalProperties:
            type: integer
        ordersByPayment:
          type: object
          additionalProperties:
            type: integer
        ordersByDay:
          type: array
          items:
            $ref: "#/components/schemas/OrdersByDayItem"
      required:
        - totalProducts
        - totalCategories
        - totalOrders
        - activeProducts
        - recentOrders
        - ordersByStatus
        - ordersByPayment
        - ordersByDay
